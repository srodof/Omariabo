<style>
  :root{
    --paper:#eee6d8;
    --ink:#231f1a;
    --ink-soft:#6f6555;
    --lavender:#9f8eb6;
    --line:rgba(35,31,26,0.16);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vw;
  }
  main{
    text-align:center;
    max-width:420px;
  }
  img.logo{
    width:min(70vw,280px);
    height:auto;
    margin:0 auto 28px;
    display:block;
  }
  p.tagline{
    color:var(--ink-soft);
    font-size:1rem;
    line-height:1.6;
    margin:0 0 34px;
  }
  a.cta{
    display:inline-block;
    background:var(--ink);
    color:var(--paper);
    text-decoration:none;
    font-size:0.8rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    padding:16px 30px;
    border-radius:2px;
    transition:opacity .2s ease;
  }
  a.cta:hover{ opacity:0.82; }
  a.cta:focus-visible{ outline:2px solid var(--lavender); outline-offset:3px; }
  footer{
    margin-top:40px;
    border-top:1px solid var(--line);
    padding-top:18px;
    font-size:0.72rem;
    letter-spacing:0.04em;
    color:var(--ink-soft);
  }
</style>
